<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulation Replay</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: var(--vscode-font-family);
      font-size: var(--vscode-font-size);
      background-color: var(--vscode-editor-background);
      color: var(--vscode-editor-foreground);
      height: 100vh;
      overflow: hidden;
    }

    #root {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Loading state */
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--vscode-editor-foreground);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Main layout */
    .replay-container {
      position: relative;
      height: 100%;
      width: 100%;
    }

    :root {
      --replay-header: 0px;
      --replay-top: 20px;
      --panel-width: clamp(260px, 21vw, 360px);
      --timeline-width: clamp(360px, 52vw, 860px);
    }

    .deck {
      position: absolute;
      top: var(--replay-header);
      left: 0;
      width: 100%;
      height: calc(100% - var(--replay-header));
      z-index: 0;
    }

    .deck>div,
    .deck canvas,
    .deck .mapboxgl-canvas,
    .deck .mapboxgl-map {
      width: 100% !important;
      height: 100% !important;
    }

    .agentsociety-left {
      position: absolute;
      top: calc(var(--replay-header) + var(--replay-top));
      left: 0;
      z-index: 1;
    }

    .agentsociety-right {
      position: absolute;
      top: calc(var(--replay-header) + var(--replay-top));
      right: 0;
      z-index: 1;
      overflow: hidden;
      width: var(--panel-width);
    }

    .left-inner {
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.2);
      border-radius: 0 8px 8px 0;
      margin: 8px 0;
      padding: 12px 16px;
      width: var(--panel-width);
      height: calc(100vh - var(--replay-header) - 60px);
      overflow: auto;
      backdrop-filter: blur(40px);
      transition: transform 0.3s ease-in-out;
    }

    .left-inner.collapsed {
      transform: translateX(-100%);
    }

    .left-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      margin: 8px 0 12px;
    }

    .left-title-icon {
      font-size: 16px;
    }

    .left-section-title {
      font-weight: 600;
      margin: 12px 0 6px;
    }

    .left-info-block,
    .left-info-block-status {
      min-width: 47%;
      margin: 4px 0;
      padding: 8px;
      border-radius: 4px;
      align-items: center;
      background: rgba(22, 119, 255, 0.06);
      display: flex;
      justify-content: space-between;
    }

    .left-info-block-status {
      line-height: 1.4;
      display: block;
    }

    .left-info-block:hover,
    .left-info-block-status:hover {
      background: rgba(22, 119, 255, 0.12);
      cursor: pointer;
      transition: background 0.3s;
    }

    .left-info-history-card {
      border-radius: 8px;
      background-color: rgba(192, 192, 192, 0.1);
      margin: 8px 0;
      width: 100%;
    }

    .left-info-history-inner {
      padding: 8px;
    }

    .left-info-empty {
      padding: 12px 8px;
      color: #5a5a5a;
    }

    .left-label {
      color: #4a4a4a;
      margin-right: 4px;
    }

    .left-value {
      color: #1f1f1f;
    }

    .right-inner {
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.2);
      border-radius: 8px 0 0 8px;
      margin: 8px 0;
      width: var(--panel-width);
      height: calc(100vh - var(--replay-header) - 60px);
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(40px);
      transition: transform 0.3s ease-in-out;
    }

    .right-inner.collapsed {
      transform: translateX(100%);
    }

    .tabs {
      display: flex;
      gap: 6px;
      padding: 12px 8px 8px;
      flex-wrap: wrap;
    }

    .tab-item {
      border: none;
      padding: 6px 10px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      font-size: 12px;
    }

    .tab-item.active {
      background: rgba(22, 119, 255, 0.2);
      color: #1677FF;
      font-weight: 600;
    }

    .right-content {
      flex: 1;
      overflow: auto;
      padding: 0 12px 12px;
    }

    .right-section-title {
      font-weight: 600;
      margin: 12px 0 6px;
    }

    .right-card,
    .right-info-card {
      background: rgba(255, 255, 255, 0.7);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .right-card-meta {
      font-size: 11px;
      color: #5a5a5a;
      margin-bottom: 4px;
    }

    .right-card-content {
      font-size: 13px;
    }

    .right-empty {
      color: #5a5a5a;
      padding: 8px 0;
    }

    .network-graph {
      width: 100%;
      margin-bottom: 8px;
    }

    .control-progress {
      position: absolute;
      background: rgba(255, 255, 255, 1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.2);
      border-radius: 28px;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      width: min(var(--timeline-width), calc(100vw - 2 * var(--panel-width) - 80px));
      max-width: var(--timeline-width);
      min-width: 320px;
      height: 56px;
      z-index: 1;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 12px;
    }

    /* Placeholder for map when not available */
    .map-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--vscode-descriptionForeground);
      gap: 8px;
    }

    .map-placeholder-icon {
      font-size: 48px;
      opacity: 0.5;
    }

    /* Agent list */
    .agent-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .agent-item {
      padding: 8px 12px;
      margin-bottom: 4px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--vscode-list-hoverBackground);
      transition: background 0.2s;
    }

    .agent-item:hover {
      background: var(--vscode-list-activeSelectionBackground);
    }

    .agent-item.selected {
      background: var(--vscode-list-activeSelectionBackground);
      color: var(--vscode-list-activeSelectionForeground);
    }

    .agent-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--vscode-button-background);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
    }

    .agent-info {
      flex: 1;
    }

    .agent-name {
      font-weight: 500;
    }

    .agent-action {
      font-size: 11px;
      color: var(--vscode-descriptionForeground);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Panel tabs */
    .panel-tabs {
      display: flex;
      border-bottom: 1px solid var(--vscode-panel-border);
    }

    .panel-tab {
      flex: 1;
      padding: 8px 12px;
      text-align: center;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .panel-tab:hover {
      background: var(--vscode-list-hoverBackground);
    }

    .panel-tab.active {
      border-bottom-color: var(--vscode-focusBorder);
      color: var(--vscode-focusBorder);
    }

    /* Detail panel */
    .detail-panel {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .detail-section {
      margin-bottom: 16px;
    }

    .detail-section-title {
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--vscode-foreground);
    }

    .detail-item {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 12px;
    }

    .detail-label {
      color: var(--vscode-descriptionForeground);
    }

    .detail-value {
      color: var(--vscode-foreground);
    }

    /* Dialog list */
    .dialog-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .dialog-item {
      padding: 8px 12px;
      border-radius: 6px;
      background: var(--vscode-editor-inactiveSelectionBackground);
    }

    .dialog-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      font-size: 11px;
      color: var(--vscode-descriptionForeground);
    }

    .dialog-content {
      font-size: 13px;
      line-height: 1.4;
    }

    /* V2 only uses 反思 (thought/reflection) */
    .dialog-type-thought {
      border-left: 3px solid #9b59b6;
    }

    /* Timeline player */
    .timeline-player {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      min-width: 0;
    }

    .timeline-player .timeline-slider-wrap {
      flex: 1 1 180px;
      min-width: 100px;
      max-width: 420px;
    }

    .status {
      border-radius: 16px;
      background: rgba(192, 192, 192, 0.2);
      height: 32px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      white-space: nowrap;
    }

    .player {
      border-radius: 16px;
      background: rgba(192, 192, 192, 0.2);
      height: 32px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
      width: fit-content;
      min-width: fit-content;
    }

    .player-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .timeline-btn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .timeline-btn:hover {
      background: rgba(22, 119, 255, 0.2);
    }

    .timeline-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .timeline-slider {
      flex: 1;
      height: 4px;
      appearance: none;
      -webkit-appearance: none;
      background: rgba(22, 119, 255, 0.3);
      border-radius: 2px;
      outline: none;
    }

    .timeline-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #1677FF;
      cursor: pointer;
    }

    .speed-selector {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      white-space: nowrap;
    }

    .speed-selector select {
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 16px;
      padding: 2px 8px;
      font-size: 11px;
    }

    .circle-wrap select {
      border-radius: 16px;
    }

    /* ========== V1 Aligned Styles ========== */

    /* Scrollbar styling like V1 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      border-radius: 3px;
      background: rgba(0, 0, 0, 0.06);
      -webkit-box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.08);
    }

    ::-webkit-scrollbar-thumb {
      border-radius: 3px;
      background: rgba(0, 0, 0, 0.12);
      -webkit-box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.2);
    }

    /* Flickering dot animation */
    @keyframes flicker {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .flickering-dot.active {
      animation: flicker 1s infinite;
    }

    /* Ant Design overrides */
    .w-full {
      width: 100%;
    }

    /* Bubble list container */
    .bubble-no-input {
      padding: 0 8px 8px 0;
      height: calc(100vh - var(--replay-header) - 180px);
      overflow: auto;
    }

    .bubble-input {
      padding: 0 8px 8px 0;
      height: calc(100vh - var(--replay-header) - 260px);
      overflow: auto;
    }

    /* Custom bubble list styles */
    .bubble-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 8px;
      overflow: auto;
      height: calc(100vh - var(--replay-header) - 180px);
    }

    .bubble-item {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .bubble-item.bubble-left {
      flex-direction: row;
    }

    .bubble-item.bubble-right {
      flex-direction: row-reverse;
    }

    .bubble-content {
      max-width: 80%;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 8px;
      padding: 8px 12px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
    }

    .bubble-header {
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }

    .bubble-text {
      font-size: 13px;
      line-height: 1.4;
      color: #333;
      word-wrap: break-word;
    }

    /* Ant Design Slider gradient track like V1 */
    .ant-slider .ant-slider-track {
      background: linear-gradient(90deg, #1677FF22 1%, #1677FF 100%);
    }

    /* Ant Design Tabs styling - Two row aligned layout */
    .right-inner .ant-tabs {
      width: 100% !important;
    }

    .right-inner .ant-tabs-nav {
      margin: 0 !important;
      padding: 8px 8px 4px !important;
    }

    /* Two row grid layout - force with !important */
    .right-inner .ant-tabs-nav-list {
      display: grid !important;
      grid-template-columns: repeat(3, 1fr) !important;
      gap: 6px !important;
      width: 100% !important;
      flex-wrap: wrap !important;
    }

    .right-inner .ant-tabs-nav-wrap {
      overflow: visible !important;
      flex: 1 !important;
    }

    /* Hide ink bar */
    .right-inner .ant-tabs-ink-bar {
      display: none !important;
    }

    .right-inner .ant-tabs-content {
      padding: 0 8px 8px;
      overflow: auto;
      height: calc(100vh - var(--replay-header) - 140px);
    }

    .right-inner .ant-tabs-tab {
      padding: 6px 4px !important;
      margin: 0 !important;
      border-radius: 14px !important;
      background: rgba(0, 0, 0, 0.04) !important;
      font-size: 12px !important;
      border: none !important;
      transition: all 0.2s;
      justify-content: center !important;
      text-align: center !important;
    }

    .right-inner .ant-tabs-tab:hover {
      background: rgba(22, 119, 255, 0.1) !important;
    }

    .right-inner .ant-tabs-tab-active {
      background: rgba(22, 119, 255, 0.15) !important;
    }

    .right-inner .ant-tabs-tab-active .ant-tabs-tab-btn {
      color: #1677FF !important;
    }

    /* Ant Design Select styling */
    .circle-wrap .ant-select .ant-select-selector {
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    /* Social panel styling */
    .social-panel {
      overflow: auto;
    }

    /* Ant Typography adjustments */
    .ant-typography {
      margin: 0;
    }

    /* Ant Divider adjustments */
    .ant-divider {
      margin: 8px 0;
    }

    /* Selected info block */
    .left-info-block.selected {
      background: rgba(22, 119, 255, 0.2);
    }

    /* Ant Button in timeline */
    .timeline-player .ant-btn {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Fix Ant Slider in timeline */
    .timeline-player .ant-slider {
      flex: 1;
      margin: 0 8px;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script src="./replay.js"></script>
</body>

</html>
