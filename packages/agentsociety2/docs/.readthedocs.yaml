# ReadTheDocs Configuration File
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  apt_packages:
    - graphviz

python:
  install:
    - requirements: docs/requirements.txt
    - method: pip
      path: packages/agentsociety2

sphinx:
  configuration: packages/agentsociety2/docs/conf.py

formats:
  - pdf
  - htmlzip
